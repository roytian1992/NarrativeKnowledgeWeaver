id: parse_abbreviations
category: text_processing
name: Extract Document-Specific Abbreviations and Technical Terms
description: >
  Extract document-specific English abbreviations/codes/models and technical terms from text.
  Focus on terms that are meaningful in this document's context (not generic well-known words).
  Strict JSON-only output. No merging.

task_variables:
  - name: text
    type: string
    required: true
    description: The source text to extract terms from.

  - name: current_background
    type: string
    required: false
    description: Optional background/context for disambiguation.

template: |
  阅读输入文本并抽取文档特定的缩写/代号/型号和技术术语。

  --------------------------------
  任务范围
  --------------------------------
  抽取以下两类：
  1) 英文缩写/代号/型号：
     - 由拉丁字母、数字、连字符、点或斜杠组成
     - 长度 2-20
     - 保持原文中的大小写和符号完全一致
  2) 技术术语：
     - 与工程、技术、军事、航空航天、
       计算/AI、组织与系统、计划/项目相关的领域特定概念
     - 可以是多词短语

  --------------------------------
  文档特定过滤（非常重要）
  --------------------------------
  只抽取在本文档中具体且有意义的术语。
  排除在上下文中不能唯一标识具体概念的通用、广为人知的词语。

  排除示例（过于通用，除非文本明确定义了特定实例）：
  - "technology"、"system"、"model"、"algorithm"、"database"、"network"、"AI"、"machine learning"
  - "company"、"organization"、"team"、"device"（通用用法）
  - 常见日常词汇或通用职位名称

  在以下情况下包含（术语是文档特定的）：
  - 命名的系统/模块/组件、协议或方法名称、内部项目名称、
    特定型号/代号、命名的组织/单位、独特的新造术语或定义的概念。

  --------------------------------
  字段和约束（白名单）
  --------------------------------
  每个条目必须包含：
  - name：文本中完全一致的片段（逐字符匹配，保持大小写/标点/空格）
  - description：12-30 词的英文客观解释，基于文本上下文

  可选字段：
  - abbr：如果是缩写/代号/型号，填写（通常与 name 相同）
  - full：只有当文本明确提供完整形式时填写（使用文本中的原样）
  - zh：可选的中文解释，取决于输入语言。

  严禁输出除以下字段外的任何字段：name、description、abbr、full、zh。

  --------------------------------
  拆分和禁止合并规则（关键）
  --------------------------------
  不要合并多个条目。
  如果多个缩写/型号/代号由 "/"、","、"and"、"or" 连接
  （例如 "550W/550A"、"X-15B/C"、"AB-1 and AB-2"）：
  - 你必须将它们拆分为单独的条目
  - 你不能输出指向多个对象的单个 name
  - 绝不生成包含 "/" 或 " and " 等表示多个对象的合并模式的 name

  --------------------------------
  名称一致性规则（关键）
  --------------------------------
  name 必须是原始文本中完整、连续的片段，
  逐字符一致（包括大小写、空格、连字符、点、斜杠等）。
  不要重写、更正、规范化或改写 name。

  --------------------------------
  缩写和完整形式处理
  --------------------------------
  如果文本包含 "完整形式 (缩写)" 或 "缩写 (完整形式)"：
  - 使用缩写作为主条目（name = 缩写）
  - 只有当完整形式明确出现在文本中时才填写 full
  - 不要将 "完整形式 (缩写)" 作为单个 name

  --------------------------------
  过滤和限制
  --------------------------------
  排除：
  - 纯粹的 "数字+单位" 如 10km、3dB、9G
  - 个人姓名（除非明显是组织/单位名称）
  - 过于通用且非文档特定的条目（见上方过滤规则）

  条目总数不得超过 15 个。

  --------------------------------
  去重
  --------------------------------
  严格按 name 精确匹配去重（区分大小写和标点）。
  如果出现重复，保留信息更丰富的那个。

  --------------------------------
  当前背景（可选）
  --------------------------------
  {current_background}

  --------------------------------
  输出格式（严格，仅 JSON）
  --------------------------------
  {{
    "abbreviations": [
      {{ "name": "...", "description": "...", "abbr": "...", "full": "..."}}
    ]
  }}

  --------------------------------
  最终说明
  --------------------------------
  - 只输出 JSON。
  - 不要 markdown，不要评论。
  - 不要编造文本不支持的事实。
