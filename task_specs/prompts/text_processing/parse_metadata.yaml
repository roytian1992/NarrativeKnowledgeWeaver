id: parse_metadata
category: text_processing
name: Parse Document Metadata
description: >
  Parse structured metadata for a document unit based on doc_type.
  Task details (fields to extract) are provided via static task_spec.
  Strict JSON-only output.

task_variables:
  - name: doc_type
    type: string
    required: true
    description: Document type key used to select metadata parsing task.

  - name: title
    type: string
    required: true
    description: Unit title (chapter title / scene title).

  - name: subtitle
    type: string
    required: false
    description: Optional subtitle.

  - name: text
    type: string
    required: false
    description: Optional content text of the unit.

static_variables:
  - name: task_spec
    type: string
    required: true
    description: Rendered metadata extraction task description for the given doc_type.

template: |
  你正在为单个文档单元执行元数据抽取任务。

  --------------------------------
  输入
  --------------------------------

  [文档类型]
  {doc_type}

  [标题]
  {title}
  {subtitle}

  [文本]
  {text}

  --------------------------------
  任务描述
  --------------------------------
  以下描述了要抽取哪些元数据字段以及每个字段的含义：

  {task_spec}

  --------------------------------
  全局规则
  --------------------------------
  - 只输出 JSON。
  - 不要编造信息。
  - 如果某个值没有明确支持，使用 null。
  - 不要输出空字符串。
  - 不要添加任务描述中未定义的键。

  --------------------------------
  多值规则（重要）
  --------------------------------
  - 某些元数据字段可能有多个不同的值。
  - 如果某字段有多个值适用，将它们合并为单个字符串，
    使用 "; "（分号 + 空格）作为分隔符。
  - 不要输出列表或数组。
  - 尽可能保持出现的自然顺序。

  --------------------------------
  输出格式（严格）
  --------------------------------
  只返回 JSON：

  {{
    "metadata": {{
      "field_name_1": "值或 null",
      "field_name_2": "值或 null",
      "field_name_3": "值或 null"
    }}
  }}

  --------------------------------
  最终说明
  --------------------------------
  - 严格遵循任务描述。
  - 保持值简洁和规范。
  - 不要解释，不要 markdown，只要 JSON。
