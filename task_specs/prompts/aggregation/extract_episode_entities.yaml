id: extract_episodes
category: aggregation
name: Extract Episodes from Events
description: >
  Group Event entities into goal-driven Episodes based on the given text.
  Strict JSON-only output.

task_variables:
  - name: text
    type: string
    required: true
    description: Original narrative text.

  - name: entities
    type: string
    required: true
    description: JSON string of entities (Event/Occasion).

static_variables:
  - name: entity_definitions_text
    type: string
    required: true
    description: Event、Occasion、Episode、Storyline 的定义文本。

  - name: episode_output_fields_text
    type: string
    required: true
    description: Episode 输出字段定义。

  - name: episode_construction_constraints_text
    type: string
    required: true
    description: 基于 schema 的 Episode 结构约束。

  - name: episode_writing_constraints_text
    type: string
    required: true
    description: 基于 schema 的 Episode 写作约束。

  - name: episode_sample_json_text
    type: string
    required: true
    description: 来自 schema 的 Episode 示例对象。

template: |
  你是一个信息抽取和叙事结构化助手。

  定义：
  {entity_definitions_text}

  任务：
  给定一个实体列表（Events 和 Occasions）和原始文本，将 Events 分组为 Episodes。

  输入：
  1) text：抽取实体的原始叙事文本。
  2) entities：实体列表。每个实体具有：
     - id：字符串
     - name：字符串
     - description：字符串
     - type："Event" 或 "Occasion"

  规则：
  {episode_construction_constraints_text}
  - 粒度目标：普通场景/场景片段通常输出 1-3 个 Episode，只有信息密度很高的关键转折场景才使用 4 个。
  - 一个 Episode 通常应包含多个紧密关联的 Event，只要它们共同构成同一个局部戏剧 beat。
  - 优先将以下 Events 分组在一起：
    - 基于相同文本片段，
    - 位于相同 Occasion 内，
    - 或在文本中通过短程时间或因果关系紧密耦合。
  - 对于同一个连贯的戏剧性动作段，优先生成一个更充实的 Episode，而不是多个只有细微措辞差异的薄 Episode。
  - 连续对话、追逐、对峙或动作链应尽量保持在同一个 Episode 中，除非局部情境发生了明显变化。
  - 不要因为说话人变化就拆分对话；只有话题、筹码、目标或即时局势发生变化时才拆分。
  - 不要因为具体动作变化就拆分动作段落；只有局部目标或结果发生变化时才拆分。
  - Episode 名称应该是简洁的、以行动为导向的短语。

  Episode 输出字段：
  {episode_output_fields_text}

  Episode 写作约束：
  {episode_writing_constraints_text}
  - 如果文本支持，description 应尽量覆盖起始情境、关键互动或推进，以及直接的局部结果。
  - 如果多个紧密相连的 Events 可以一起描述，不要只把 description 写成单个微动作的复述。
  - 优先为充实的 Episode 写 2-4 句描述，而不是生成多个一句话的微型 Episode。

  示例 Episode 对象：
  {episode_sample_json_text}

  只输出 JSON，使用以下模式：

  {{
    "episodes": [
      {{
        "name": "...",
        "description": "...",
        "related_events": ["..."],
        "related_occasions": ["..."]
      }}
    ]
  }}

  现在处理以下输入。

  文本：
  {text}

  要处理的实体：
  {entities}
