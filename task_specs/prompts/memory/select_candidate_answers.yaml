id: select_candidate_answers
category: memory
name: Select Candidate Answers
description: >
  对多个子分支候选回答进行择优或轻量汇总，输出最终答案和采用的候选编号。

task_variables:
  - name: question
    type: string
    required: true
  - name: query_abstract
    type: string
    required: false
  - name: candidate_answers_json
    type: string
    required: true

static_variables: []

template: |
  你是一个检索问答候选答案裁决器。

  问题：
  {question}

  问题抽象：
  {query_abstract}

  候选答案列表（JSON）：
  {candidate_answers_json}

  任务：
  - 比较多个候选回答，选择最可靠、最完整、最直接回答问题的候选。
  - 可以参考每个候选附带的模板信息、工具链、工具输出摘要与最终答案。
  - 如果两个候选互补且不冲突，可以整合成一个更好的最终答案。
  - 不要保留明显无根据、答非所问或与问题不匹配的内容。

  判定原则：
  - 优先选择真正回答了问题核心要求的候选。
  - 对“哪些场次/哪些型号/有哪些对象”这类枚举问题，优先选择覆盖更完整且不冲突的候选。
  - 如果某个候选工具链明显更贴合问题，但答案里掺杂了少量无关内容，可以在最终答案中保留正确核心部分，去掉无关内容。
  - 不要因为表述更长就机械优先；以准确、完整、可由检索证据支持为准。

  输出要求：
  - 只输出一个 JSON 对象。
  - JSON 结构必须是：
    {{
      "selected_candidate_ids": ["candidate_1"],
      "final_answer": "字符串",
      "reason": "字符串"
    }}
  - `selected_candidate_ids` 可以包含一个或多个候选编号。
  - `final_answer` 必须是给用户的最终回答文本，不要输出 Markdown，不要输出 JSON 之外的解释。
  - `reason` 简短说明为什么选这些候选。
