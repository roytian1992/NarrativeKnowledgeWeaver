id: finalize_entity_properties
category: problem_solving
name: Finalize Entity Properties
description: >
  Canonicalize and consolidate noisy candidate properties into a small, stable set of global properties
  and produce a consolidated new_description. Strict JSON-only output.

task_variables:
  - name: entity_name
    type: string
    required: true
    description: Entity name.

  - name: candidate_properties_json
    type: string
    required: true
    description: Pretty JSON string of candidate properties pooled from multiple chunks.

  - name: full_description_text
    type: string
    required: true
    description: Full concatenated entity description text (source of truth for support).

  - name: num_properties
    type: integer
    required: true
    description: Maximum number of properties to output (may output fewer, never more).

static_variables: []

template: |
  你正在为单个实体执行规范属性抽象任务。

  这不是简单的合并。
  你的任务是将嘈杂的属性重新组织、抽象和整合为一组
  小型、稳定的长期实体属性，适合知识图谱存储。

  --------------------------------
  输入
  --------------------------------

  [实体名称]
  {entity_name}

  [候选属性 JSON]
  从多个文本片段中提取的键值对 JSON 对象。
  此集合可能包含：
  - 冗余或重叠的键
  - 不一致的命名
  - 短期、情境性或叙事特定的属性

  这些属性是参考池，而不是最终模式。

  {candidate_properties_json}

  [完整描述文本]
  实体的完整拼接描述文本。

  此文本是以下内容的唯一真实来源：
  - 最终的 new_description
  - 验证属性是否真正有支持

  {full_description_text}

  [目标属性数量]
  {num_properties}

  这是期望输出的属性数量。
  你可以输出更少，但绝不能更多。

  --------------------------------
  任务分解（重要）
  --------------------------------

  你必须执行两个相关但不同的任务：

  1) 生成 new_description
  - 仅基于完整描述文本。
  - 一个简洁、连贯的2-6句段落。
  - 关注稳定身份、长期角色、隶属关系和定义性特征。
  - 不要列举属性或罗列特性。

  2) 生成 properties
  - 主要基于候选属性 JSON。
  - 这是一个抽象和整合过程：
    多个输入属性 → 更少、更高级别的语义维度。

  --------------------------------
  全局 vs 局部（关键）
  --------------------------------

  以下情况属于全局属性：
  - 身份：实体是什么/谁（职业、社会角色、物种/类型、规范身份）
  - 稳定隶属关系：成员资格/雇佣关系/与组织/派系的长期关联
  - 稳定特征：性格、长期倾向、持久的身体状况
  - 持久能力或限制：技能、残疾、慢性疾病
  - 持久背景：来源、家庭关系类型（例如，如果"某人的侄女"是稳定事实）
  - 长期拥有物或资源（仅当反复提及或明显持久时）

  以下情况属于局部属性，必须排除：
  - 场景中的瞬时情绪状态（某一刻的恐惧、恐慌）
  - 单次事件角色（某次调查的目击者/目标、某事件的参与者）
  - 与另一个具名人物的一次性互动（被X安慰、在此场景中被Y带领）
  - 临时位置或即时情况（"正在躲藏"、"现在在这个房间里"）
  - 可能变化的细粒度关系快照（信任中；受威胁；不受欢迎的接近）
  - 场景特定的行为细节（"阅读盲文"只有在表明稳定能力/习惯时才可接受）

  如果你不确定某个事实是全局还是局部的，请不要包含它。

  --------------------------------
  属性设计规则（关键）
  --------------------------------

  A) 语义键设计（强制）
  - 键表示语义维度，而非答案。
    正确示例："视觉状况": "失明"
    错误示例："眼瞎": "是"
  - 键必须：
    - 在概念上在多个实体间稳定
    - 可在此单个实体之外复用
    - 使用中性名词或名词短语
    - 使用 snake_case
  - 禁止：
    - 布尔风格的键（"是x"、"有y"）
    - 仅形容词的键（"失明"、"已婚"）
  - 值绝不能是 yes/no/true/false。
  - 值可以是关键词或简短规范短语（短句），但不能是长文本。

  B) 抽象和去重
  - 尽可能将多个低级或叙事特定的属性合并为一个更高级的语义维度。
  - 每个语义维度只选择一个规范键。
  - 优先顺序：
    1) 符合模式或常用可复用的键
    2) 否则选择保留含义的最通用抽象
  - 绝不为同一概念保留多个键。

  C) 冲突处理
  - 如果值冲突：
    - 优先选择更稳定、长期的解释。
    - 优先选择完整描述文本更好支持的值。
  - 如果冲突无法自信解决，完全省略该属性。
  - 绝不编造事实来解决冲突。

  D) 稀疏性和支持（严格）
  - 绝不输出空字符串值。
  - 每个属性必须得到完整描述文本的明确支持。
  - 如果支持较弱、隐含或推测性的，省略该键。

  E) 新键限制
  - 不要自由发明新的语义维度。
  - 只有在替换无效键形式时才可引入新键
    （例如，"眼瞎":"是" → "视觉状况":"失明"）。

  --------------------------------
  结构约束（必须遵循）
  --------------------------------

  1) 属性数量约束
  - 最多输出 {num_properties} 个属性。
  - 优先选择更少、更抽象、更高价值的属性，
    而非许多狭窄或特定的属性。

  2) 关系折叠（非常重要）
  - 绝不输出针对特定对象的关系键：
    "与某人关系"、"某人朋友"、"被某人带领"。
  - 绝不输出通用的扩展键：
    "关系"、"人际关系"。
  - 所有关系相关信息必须折叠为：
    "关系摘要": "父子关系；与韩朵朵为兄妹关系"
  - 如果存在关系，只保留此键。

  3) 角色/身份整合
  - 如果属性包含 "角色"、"职业"、"身份"、"职位"：
    - 最多保留一到两个长期身份键。
    - 丢弃情境性或事件特定的角色。

  4) 紧凑性要求
  - 最终属性对象必须小型、稳定且便于合并。
  - 每个键应该在图谱中合理地适用于许多实体。

  --------------------------------
  输出格式（严格）
  --------------------------------

  只返回以下精确结构的 JSON：

  {{
    "new_description": "最终整合的实体描述（2-6句话）",
    "properties": {{
      "canonical_key": "canonical_value",
      "another_key": "another_value"
    }}
  }}

  --------------------------------
  最终说明
  --------------------------------

  - 只输出 JSON。
  - 不要解释、评论或 markdown。
  - 不要编造事实。
  - 不要超过 {num_properties} 个属性。
  - 不要包含空键或冗余键。
  - new_description 必须使用中文撰写。
