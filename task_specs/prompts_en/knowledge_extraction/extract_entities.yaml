id: entity_extraction
category: knowledge_extraction
name: Entity Extraction
description: >
  Extract entities from narrative text with strict JSON output.

task_variables:
  - name: text
    type: string
    required: true
    description: Input chunk text.

  - name: memory_context
    type: string
    required: false
    description: >
      Optional extraction memory hints from previous documents.
      Each line is a past correction or rule that may apply to this chunk.

static_variables:
  - name: task_name
    type: string
    required: true
    description: Short name of the extraction task, shown in the prompt header.

  - name: task_goal
    type: string
    required: true
    description: Precise description of what the entity extraction task should accomplish.

  - name: global_constraints
    type: string
    required: true
    description: Global rules and constraints that must always be followed during extraction.

  - name: type_definitions
    type: string
    required: true
    description: Definitions of allowed entity types and their semantics.

  - name: output_fields_block
    type: string
    required: true
    description: Specification of required output fields for each extracted entity.

  - name: few_shot_samples
    type: string
    required: false
    description: Optional few-shot examples demonstrating correct extraction behavior.



template: |
  You are performing knowledge graph entity extraction.
  Task:
  {task_name}

  Goal:
  {task_goal}

  Global constraints:
  {global_constraints}

  Types:
  {type_definitions}

  Output format:
  Return a JSON array.
  Each element must include exactly:
  {output_fields_block}

  Do NOT include any additional fields.
  Do NOT include explanations, commentary, or additional text outside the JSON.

  Examples:
  {few_shot_samples}

  Extraction Memory Hints (from past corrections — apply where relevant):
  {memory_context}

  Input Text:
  {text}