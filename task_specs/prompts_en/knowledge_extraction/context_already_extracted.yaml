id: context_already_extracted
category: knowledge_extraction
name: Already Extracted Items
description: >
  Optional list of already extracted entities/relations. The model should avoid re-extracting them.

task_variables:
  - name: extracted_items
    type: string
    required: false
    description: JSON/text list of already extracted items (entities or relations).

  - name: item_type
    type: string
    required: false
    description: \"entities\" or \"relations\" or a generic label.

static_variables:
  - name: default_item_type
    type: string
    required: false
    description: Default label if item_type is not provided.

template: |
  During previous rounds, the following {item_type} have already been extracted.
  Do not re-extract them.

  {extracted_items}
